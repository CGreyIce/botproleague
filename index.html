<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BPL Menu Page</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root{
    --bg: #10131a;
    --bg-panel: #161b24;
    --line: #262d3a;
    --ink: #e7ebf3;
    --ink-dim: #7b869a;
    --team-a: #ff5a3c;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; min-height: 100vh;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Courier New', Consolas, monospace;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 34px 34px;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 60px 20px; }

  .brand { border-bottom: 2px solid var(--line); padding-bottom: 14px; margin-bottom: 28px; }
  .brand h1 { font-size: 22px; letter-spacing: 3px; text-transform: uppercase; margin: 0; }
  .brand h1 span { color: var(--team-a); }
  .brand .sub { color: var(--ink-dim); font-size: 12px; letter-spacing: 2px; margin-top: 6px; }

  .links { display: flex; flex-direction: column; gap: 14px; }
  a.link-card {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg-panel); border: 1px solid var(--line);
    padding: 20px 24px; text-decoration: none; color: var(--ink);
    transition: border-color .15s, transform .1s;
  }
  a.link-card:hover { border-color: var(--team-a); transform: translateX(4px); }
  .link-card .title { font-size: 15px; font-weight: 700; letter-spacing: 1px; }
  .link-card .desc { color: var(--ink-dim); font-size: 12px; letter-spacing: 1px; margin-top: 4px; }
  .link-card .arrow { color: var(--team-a); font-size: 18px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <h1>CS <span>TOOLS</span></h1>
      <div class="sub">SELECT A PAGE</div>
    </div>
    <div class="links">
      <a class="link-card" href="map-vetov7.html">
        <div>
          <div class="title">Map Veto Simulator</div>
          <div class="desc">Pick / ban phase simulator — Bo3 &amp; Bo5</div>
        </div>
        <div class="arrow">→</div>
      </a>
      <a class="link-card" href="team-shuffler.html">
        <div>
          <div class="title">Team Shuffler</div>
          <div class="desc">Randomize players into teams — group people to keep them together</div>
        </div>
        <div class="arrow">→</div>
      </a>
    </div>
  </div>
</body>
</html>
