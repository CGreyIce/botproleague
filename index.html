<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CS Tools // Index</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #10131a;
    --bg-panel: #161b24;
    --line: #262d3a;
    --ink: #e7ebf3;
    --ink-dim: #7b869a;
    --team-a: #ff5a3c;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; min-height: 100vh;
    background-color: var(--bg);
    color: var(--ink);
    font-family: 'Courier New', Consolas, monospace;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 34px 34px;
    transition: background-color .5s ease, color .5s ease;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 60px 20px; }

  .brand { border-bottom: 2px solid var(--line); padding-bottom: 14px; margin-bottom: 28px; }
  .brand h1 {
    font-size: 22px; letter-spacing: 3px; text-transform: uppercase; margin: 0;
    user-select: none; cursor: default;
  }
  .brand h1 .accent { color: var(--team-a); }
  .brand .sub { color: var(--ink-dim); font-size: 12px; letter-spacing: 2px; margin-top: 6px; }

  /* the hidden input that takes the place of the first word */
  #wordInput{
    font: inherit; letter-spacing: 3px; text-transform: uppercase;
    background: transparent; color: var(--team-a);
    border: none; border-bottom: 2px solid var(--team-a);
    width: 4.5em; padding: 0; margin: 0; outline: none;
  }
  @keyframes nope { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
  .shake { animation: nope .3s; }

  .links { display: flex; flex-direction: column; gap: 14px; }
  a.link-card {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg-panel); border: 1px solid var(--line);
    padding: 20px 24px; text-decoration: none; color: var(--ink);
    transition: border-color .15s, transform .1s, background .5s;
  }
  a.link-card:hover { border-color: var(--team-a); transform: translateX(4px); }
  .link-card .title { font-size: 15px; font-weight: 700; letter-spacing: 1px; }
  .link-card .desc { color: var(--ink-dim); font-size: 12px; letter-spacing: 1px; margin-top: 4px; }
  .link-card .arrow { color: var(--team-a); font-size: 18px; }

  /* ---------- APEX MODE ---------- */
  body.apex{
    --bg: #0c0d10;
    --bg-panel: #15171c;
    --line: #2a2f38;
    --ink: #e8eaed;
    --ink-dim: #7f8794;
    --team-a: #e8452c;
    font-family: Inter, system-ui, sans-serif;
    background-image:
      repeating-linear-gradient(115deg, rgba(255,255,255,.014) 0 2px, transparent 2px 9px),
      radial-gradient(1100px 520px at 78% -8%, rgba(232,69,44,.13), transparent 62%),
      radial-gradient(760px 420px at 8% 105%, rgba(90,169,240,.07), transparent 60%);
    background-size: auto;
    background-attachment: fixed;
  }
  body.apex .brand{ border-bottom: none; border-left: 3px solid var(--team-a); padding: 4px 0 4px 14px; }
  body.apex .brand h1{
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
    font-size: 34px; letter-spacing: .02em;
  }
  body.apex .brand .sub{ letter-spacing: .18em; color: var(--team-a); font-size: 10px; }
  body.apex a.link-card{
    clip-path: polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px);
  }
  body.apex .link-card .title{ font-family: 'Barlow Condensed', sans-serif; font-size: 20px; letter-spacing: .03em; }
  body.apex .link-card .desc{ font-family: 'Courier New', monospace; }
  body.apex #wordInput{ font-family: 'Barlow Condensed', sans-serif; }

  .hint{
    margin-top: 34px; color: var(--ink-dim); font-size: 10px; letter-spacing: 2px;
    opacity: .35; user-select: none;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <h1 id="brand"><span id="word">CS</span> <span class="accent">TOOLS</span></h1>
      <div class="sub" id="sub">SELECT A PAGE</div>
    </div>
    <div class="links" id="links"></div>
    <div class="hint" id="hint">&nbsp;</div>
  </div>

<script>
(function(){
  "use strict";

  var CS_LINKS = [
    ['map-veto.html',            'Map Veto Simulator', 'Pick / ban phase simulator \u2014 Bo3 &amp; Bo5'],
    ['team-shuffler.html',       'Team Shuffler',      'Randomize players into teams \u2014 group people to keep them together'],
    ['group-stage.html',         'Group Stage',        '16-team Swiss format \u2014 advances straight into the bracket'],
    ['bracket.html',             'Tournament Bracket', '8-team single elimination \u2014 Bo3 quarters/semis, Bo5 grand final'],
    ['cs2_match_simulator.html', 'Match Simulation',   "for when the match doesn't change the outcome"]
  ];
  var APEX_LINKS = [
    ['cs2_match_simulator_backup.html','Apex Legends Match Simulator',
     '20 squads \u00b7 ring closes \u00b7 tournaments, qualifiers &amp; majors']
  ];

  var word  = document.getElementById('word');
  var brand = document.getElementById('brand');
  var links = document.getElementById('links');
  var sub   = document.getElementById('sub');
  var hint  = document.getElementById('hint');
  var mode  = 'cs';

  function render(){
    var set = (mode === 'apex') ? APEX_LINKS : CS_LINKS;
    links.innerHTML = set.map(function(l){
      return '<a class="link-card" href="' + l[0] + '">' +
               '<div><div class="title">' + l[1] + '</div>' +
               '<div class="desc">' + l[2] + '</div></div>' +
               '<div class="arrow">\u2192</div></a>';
    }).join('');
    word.textContent = (mode === 'apex') ? 'APEX' : 'CS';
    sub.textContent  = (mode === 'apex') ? 'THE OUTLANDS' : 'SELECT A PAGE';
    document.title   = (mode === 'apex') ? 'Apex Tools // Index' : 'CS Tools // Index';
    document.body.classList.toggle('apex', mode === 'apex');
  }

  // Double-click the first word to type over it.
  brand.addEventListener('dblclick', function(){
    if (document.getElementById('wordInput')) return;
    var input = document.createElement('input');
    input.id = 'wordInput';
    input.value = '';
    input.maxLength = 12;
    input.setAttribute('spellcheck', 'false');
    input.setAttribute('aria-label', 'Rename');
    word.replaceWith(input);
    input.focus();

    // Removing the input fires blur, which would call commit() a second time.
    // One latch guards the whole exchange so it can only resolve once.
    var settled = false;
    function restore(){
      var span = document.createElement('span');
      span.id = 'word';
      span.textContent = (mode === 'apex') ? 'APEX' : 'CS';
      if (input.parentNode) input.replaceWith(span);   // may already be detached
      word = document.getElementById('word') || span;
      if (mode !== 'apex') hint.innerHTML = '&nbsp;';
    }
    function commit(){
      if (settled) return;
      settled = true;
      var v = input.value.trim().toLowerCase();
      if (v === 'apex'){
        mode = 'apex'; restore(); render();
        hint.textContent = 'DOUBLE-CLICK THE TITLE TO GO BACK';
        return;
      }
      if (v === 'cs' || v === 'cs2'){
        mode = 'cs'; restore(); render();
        hint.innerHTML = '&nbsp;';
        return;
      }
      // wrong word — shake, then put it back
      input.classList.add('shake');
      setTimeout(function(){ input.classList.remove('shake'); restore(); }, 320);
    }
    input.addEventListener('keydown', function(e){
      if (e.key === 'Enter'){ e.preventDefault(); commit(); }
      else if (e.key === 'Escape'){ settled = true; restore(); }
    });
    input.addEventListener('blur', function(){ commit(); });
  });

  render();
})();
</script>
</body>
</html>
